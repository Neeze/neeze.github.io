<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abstract Floating Background</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            overflow: hidden;
            background: #070a12;
        }

        body {
            min-height: 100vh;
        }

        .abstract-bg {
            position: fixed;
            inset: 0;
            overflow: hidden;
            isolation: isolate;
            background:
                radial-gradient(circle at 18% 18%, rgba(180, 94, 43, 0.36), transparent 30%),
                radial-gradient(circle at 68% 34%, rgba(39, 73, 139, 0.42), transparent 36%),
                radial-gradient(circle at 78% 78%, rgba(30, 47, 102, 0.36), transparent 34%),
                linear-gradient(135deg, #17151d 0%, #070a13 45%, #11192b 100%);
        }

        .abstract-bg::before,
        .abstract-bg::after {
            content: "";
            position: absolute;
            inset: -20%;
            pointer-events: none;
            filter: blur(42px);
            opacity: 0.72;
            mix-blend-mode: screen;
            animation: ambientShift 22s ease-in-out infinite alternate;
            background:
                radial-gradient(ellipse at 20% 26%, rgba(214, 123, 65, 0.2), transparent 28%),
                radial-gradient(ellipse at 58% 44%, rgba(87, 120, 198, 0.24), transparent 34%),
                radial-gradient(ellipse at 84% 64%, rgba(31, 60, 126, 0.28), transparent 32%);
        }

        .abstract-bg::after {
            filter: blur(70px);
            opacity: 0.48;
            animation-duration: 34s;
            animation-direction: alternate-reverse;
            transform: rotate(8deg) scale(1.08);
        }

        .veil {
            position: absolute;
            width: var(--w);
            height: var(--h);
            left: var(--x);
            top: var(--y);
            border-radius: 48% 52% 58% 42% / 42% 56% 44% 58%;
            background:
                radial-gradient(ellipse at 28% 28%, rgba(255, 255, 255, 0.18), transparent 18%),
                linear-gradient(var(--angle), var(--c1), var(--c2) 46%, transparent 78%);
            box-shadow:
                inset 0 0 46px rgba(255, 255, 255, 0.055),
                inset 0 0 120px rgba(98, 126, 210, 0.08),
                0 0 70px rgba(71, 93, 160, 0.08);
            filter: blur(var(--blur));
            opacity: var(--opacity);
            mix-blend-mode: screen;
            transform: rotate(var(--rotate)) scale(var(--scale));
            animation: floatVeil var(--duration) ease-in-out infinite alternate;
            animation-delay: var(--delay);
            will-change: transform, border-radius, opacity;
        }

        .veil::before,
        .veil::after {
            content: "";
            position: absolute;
            inset: 1px;
            border-radius: inherit;
            pointer-events: none;
        }

        .veil::before {
            background:
                linear-gradient(110deg, transparent 5%, rgba(255, 255, 255, 0.2) 34%, transparent 62%),
                linear-gradient(78deg, transparent 20%, var(--edge) 47%, transparent 72%);
            mask: linear-gradient(#000, transparent 74%);
            opacity: 0.52;
            filter: blur(2px);
        }

        .veil::after {
            inset: 0;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top-color: var(--edge);
            border-left-color: rgba(255, 255, 255, 0.03);
            filter: blur(0.7px);
            opacity: 0.74;
        }

        .v1 {
            --w: 72vw;
            --h: 34vh;
            --x: -18vw;
            --y: 10vh;
            --angle: 18deg;
            --c1: rgba(218, 117, 57, 0.24);
            --c2: rgba(64, 83, 143, 0.15);
            --edge: rgba(232, 137, 74, 0.32);
            --blur: 9px;
            --opacity: 0.82;
            --rotate: -18deg;
            --scale: 1.16;
            --duration: 20s;
            --delay: -3s;
        }

        .v2 {
            --w: 68vw;
            --h: 46vh;
            --x: 34vw;
            --y: -4vh;
            --angle: 142deg;
            --c1: rgba(100, 122, 194, 0.23);
            --c2: rgba(27, 41, 82, 0.12);
            --edge: rgba(149, 172, 243, 0.28);
            --blur: 12px;
            --opacity: 0.74;
            --rotate: 16deg;
            --scale: 1.08;
            --duration: 26s;
            --delay: -11s;
        }

        .v3 {
            --w: 78vw;
            --h: 38vh;
            --x: 22vw;
            --y: 38vh;
            --angle: 22deg;
            --c1: rgba(76, 103, 182, 0.24);
            --c2: rgba(220, 124, 72, 0.1);
            --edge: rgba(130, 166, 255, 0.3);
            --blur: 11px;
            --opacity: 0.76;
            --rotate: -9deg;
            --scale: 1.04;
            --duration: 24s;
            --delay: -7s;
        }

        .v4 {
            --w: 62vw;
            --h: 32vh;
            --x: -6vw;
            --y: 50vh;
            --angle: 158deg;
            --c1: rgba(183, 103, 66, 0.18);
            --c2: rgba(44, 70, 142, 0.14);
            --edge: rgba(225, 130, 76, 0.24);
            --blur: 14px;
            --opacity: 0.58;
            --rotate: 12deg;
            --scale: 1.2;
            --duration: 29s;
            --delay: -15s;
        }

        .v5 {
            --w: 54vw;
            --h: 28vh;
            --x: 62vw;
            --y: 24vh;
            --angle: 30deg;
            --c1: rgba(96, 127, 221, 0.2);
            --c2: rgba(215, 119, 64, 0.09);
            --edge: rgba(226, 137, 79, 0.25);
            --blur: 10px;
            --opacity: 0.62;
            --rotate: -15deg;
            --scale: 1.1;
            --duration: 27s;
            --delay: -19s;
        }

        .v6 {
            --w: 70vw;
            --h: 30vh;
            --x: 18vw;
            --y: 74vh;
            --angle: 176deg;
            --c1: rgba(72, 92, 168, 0.2);
            --c2: rgba(18, 26, 54, 0.04);
            --edge: rgba(122, 150, 239, 0.2);
            --blur: 16px;
            --opacity: 0.52;
            --rotate: -5deg;
            --scale: 1.15;
            --duration: 31s;
            --delay: -8s;
        }

        .light-line {
            position: absolute;
            width: 95vw;
            height: 42vh;
            left: -9vw;
            top: 30vh;
            border-radius: 50%;
            border-top: 1px solid rgba(229, 135, 75, 0.38);
            border-right: 1px solid rgba(120, 153, 241, 0.18);
            filter: blur(1.2px);
            opacity: 0.54;
            transform: rotate(5deg);
            animation: lineDrift 18s ease-in-out infinite alternate;
        }

        .light-line:nth-of-type(8) {
            width: 82vw;
            height: 36vh;
            left: 38vw;
            top: 16vh;
            border-top-color: rgba(153, 177, 255, 0.28);
            border-right-color: rgba(227, 131, 75, 0.3);
            transform: rotate(-12deg);
            animation-duration: 23s;
            animation-delay: -9s;
        }

        .grain {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.065;
            mix-blend-mode: soft-light;
            background-image:
                linear-gradient(0deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 3px 3px;
            filter: blur(0.35px);
        }

        @keyframes floatVeil {
            0% {
                transform: translate3d(-2.5vw, -1.5vh, 0) rotate(var(--rotate)) scale(var(--scale));
                border-radius: 48% 52% 58% 42% / 42% 56% 44% 58%;
                opacity: calc(var(--opacity) * 0.78);
            }

            50% {
                transform: translate3d(2.2vw, 1.8vh, 0) rotate(calc(var(--rotate) + 7deg)) scale(calc(var(--scale) * 1.04));
                border-radius: 58% 42% 47% 53% / 55% 38% 62% 45%;
                opacity: var(--opacity);
            }

            100% {
                transform: translate3d(4.6vw, -1vh, 0) rotate(calc(var(--rotate) - 5deg)) scale(calc(var(--scale) * 0.98));
                border-radius: 42% 58% 54% 46% / 48% 61% 39% 52%;
                opacity: calc(var(--opacity) * 0.86);
            }
        }

        @keyframes ambientShift {
            from {
                transform: translate3d(-3vw, -2vh, 0) rotate(-4deg) scale(1.02);
            }

            to {
                transform: translate3d(3vw, 2vh, 0) rotate(5deg) scale(1.08);
            }
        }

        @keyframes lineDrift {
            from {
                transform: translate3d(-2vw, 0, 0) rotate(5deg) scale(1);
                opacity: 0.34;
            }

            to {
                transform: translate3d(3vw, -2vh, 0) rotate(9deg) scale(1.05);
                opacity: 0.62;
            }
        }

        @media (prefers-reduced-motion: reduce) {

            .abstract-bg::before,
            .abstract-bg::after,
            .veil,
            .light-line {
                animation: none;
            }
        }
    </style>
</head>

<body>
    <main class="abstract-bg" aria-hidden="true">
        <div class="veil v1"></div>
        <div class="veil v2"></div>
        <div class="veil v3"></div>
        <div class="veil v4"></div>
        <div class="veil v5"></div>
        <div class="veil v6"></div>
        <div class="light-line"></div>
        <div class="light-line"></div>
        <div class="grain"></div>
    </main>
</body>

</html>
